# build.yml
## Destination: conker-live-and-uncut-fan/.github/workflows/build.yml

name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  UE5_VERSION: "5.3"
  GODOT_VERSION: "4.2"

jobs:
  rust-lint:
    name: Rust Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      
      - name: Check formatting
        run: cargo fmt --all -- --check
      
      - name: Run Clippy lints
        run: cargo clippy --workspace --all-targets -- -D warnings
      
      - name: Run unit tests
        run: cargo test --workspace --lib --bins

  rust-tools-build:
    name: Build Rust Tools
    runs-on: ubuntu-latest
    needs: rust-lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Build all tools (release)
        run: cargo build --workspace --release
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-tools-${{ github.sha }}
          path: |
            target/release/clr_unpack_rs
            target/release/n64_asset_converter
            target/release/repo_index_generator
          retention-days: 7

  repo-index-check:
    name: Verify Repo Index Generator
    runs-on: ubuntu-latest
    needs: rust-tools-build
    steps:
      - uses: actions/checkout@v4
      
      - name: Download built tools
        uses: actions/download-artifact@v4
        with:
          name: rust-tools-${{ github.sha }}
          path: ./tools-bin
      
      - name: Make tools executable
        run: chmod +x ./tools-bin/*
      
      - name: Generate repo index
        run: ./tools-bin/repo_index_generator --output Build/repo_index.json
      
      - name: Validate index schema
        run: |
          python3 -c "
          import json, sys
          with open('Build/repo_index.json') as f:
              data = json.load(f)
          assert 'files' in data, 'Missing files array'
          assert 'languages' in data, 'Missing languages map'
          print(f'✓ Index valid: {len(data[\"files\"])} files indexed')
          "
      
      - name: Upload index artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-index-${{ github.sha }}
          path: Build/repo_index.json
          retention-days: 7

  godot-validate:
    name: Validate Godot Project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Godot
        run: |
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.2-stable/Godot_v4.2-stable_linux.x86_64.zip
          unzip -q Godot_v4.2-stable_linux.x86_64.zip -d /tmp/godot
          chmod +x /tmp/godot/Godot_v4.2-stable_linux.x86_64
      
      - name: Validate project settings
        run: |
          /tmp/godot/Godot_v4.2-stable_linux.x86_64 --headless --path Engine/Godot --validate
          echo "✓ Godot project validation passed"

  documentation-check:
    name: Check Documentation Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          config-file: .github/link-check-config.json
          folder-path: 'Docs/'
          file-path: 'README.md'
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'

  knowledge-graph-sync:
    name: Sync Knowledge Graph Index
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [rust-tools-build, repo-index-check]
    steps:
      - uses: actions/checkout@v4
      
      - name: Download tools and index
        uses: actions/download-artifact@v4
        with:
          pattern: rust-tools-*
          merge-multiple: true
          path: ./tools-bin
      
      - name: Make tools executable
        run: chmod +x ./tools-bin/*
      
      - name: Regenerate knowledge graph index stub
        run: |
          ./tools-bin/repo_index_generator --format kg-index \
            --output Docs/TechDesign/04_Knowledge_Graph_Index.md.auto
          # Human review required before committing auto-generated content
          echo "⚠ Auto-generated KG index at Docs/TechDesign/04_Knowledge_Graph_Index.md.auto"
          echo "Please review and merge manually if changes are appropriate."

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [rust-lint, rust-tools-build, repo-index-check, godot-validate, documentation-check]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "## Build Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Rust Lint | ${{ needs.rust-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rust Tools | ${{ needs.rust-tools-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Repo Index | ${{ needs.repo-index-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Godot Validate | ${{ needs.godot-validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docs Check | ${{ needs.documentation-check.result }} |" >> $GITHUB_STEP_SUMMARY
